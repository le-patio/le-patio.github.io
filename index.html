<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1">
  <title>LE PATIO | Fine Jewelry</title>
  
  <link rel="stylesheet" type="text/css" href="style.css">
  
  <style>
    /* Aseguramos que el cuerpo no tenga scroll en la home */
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #000;
      font-family: 'Times New Roman', Times, serif;
    }

    /* Estilos para el contenedor principal de AJAX */
    #content {
      width: 100%;
      height: 100%;
    }

    .video-background {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      object-fit: cover;
    }

    .hero-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    .main-title {
      font-size: clamp(2rem, 8vw, 5rem);
      letter-spacing: 0.8rem;
      color: #fff;
      text-transform: uppercase;
      z-index: 10;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 20;
      background: transparent !important;
    }

    /* Ajuste de navegación */
    nav ul {
      display: flex;
      justify-content: space-between;
      list-style: none;
      padding: 20px 40px;
      margin: 0;
    }

    nav ul li a {
      color: #000000 !important;
      text-transform: none;
      font-size: 0.9rem;      
    }
  </style>
</head>

<body ndx--target-view="home">

  <nav>
    <ul>
      <div class="nav-left">
        <li style="display:inline; margin-right:15px;">
          <a href="shop.html">Shop</a>
        </li>
        <li style="display:inline;">
          <a href="collections.html">Collections</a>
        </li>
      </div>

      <div class="nav-right">
        <li class="cta_search" style="display:inline; margin-right:150px;">
          <a href="search.html">Search</a>
        </li>
        <li style="display:inline;">
          <a href="cart.html">Cart <span id="cart-count">(0)</span></a>
        </li>
      </div>
    </ul>
  </nav>

  <main id="content">
    <img src="https://d2w9rnfcy7mm78.cloudfront.net/42421705/original_d268699bfd4bd8f080723f02b537f448.gif" class="video-background" alt="Background">

    <div class="hero-container">
      <h1 class="main-title">LE PATIO</h1>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="libs.js"></script>
  <script src="script.js"></script>

  <script>
    // Actualizar contador del carrito
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      
      const cartCountSpans = document.querySelectorAll('#cart-count');
      cartCountSpans.forEach(span => {
        span.textContent = `(${totalItems})`;
      });
    }
    
    // Actualizar al cargar y cada vez que el storage cambie
    window.addEventListener('load', updateCartCount);
    window.addEventListener('storage', updateCartCount);
  </script>

</body>
</html>
