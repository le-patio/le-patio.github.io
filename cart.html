<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1">
  <title>LE PATIO | Cart</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background-color: #f1f1f1;
      font-family: 'Times New Roman', Times, serif;
      color: #000;
    }
  </style>
</head>

<body ndx--target-view="cart">
  <nav>
    <ul>
      <div class="first">
        <li class="cta_home">
          <a href="shop.html">LE PATIO</a>
        </li>
        <li class="start">
          <p>✧˖°.</p>
        </li>
      </div>

      <div class="width2">
        <li class="mail">
          <a href="mailto:coucoulepatio@gmail.com"></a>
        </li>
        <div class="filter hidden"></div>
      </div>

      <div>
        <li class="mail">
          <a href="mailto:coucoulepatio@gmail.com">coucoulepatio@gmail.com</a>
        </li>
        <li class="cta_cart">
          <a class="a_cart active" href="cart.html">Cart <span id="cart-count">(0)</span></a>
        </li>
      </div>
    </ul>
  </nav>

  <div class="maincart">
    <script src="https://www.paypal.com/sdk/js?client-id=AdOYSvRQzvHkOIciw99sqnb-va3U6koQ0p-stiBtp48bbFjglrkUSMKR7aTBAav39oafNMx8x95rwuBw&currency=EUR"></script>

    <div class="container">
      <div class="cart">
        <p id="empty">Tu carrito está actualmente vacío.</p>
        <p id="success-message" style="display:none; text-align: center; padding: 40px; border: 0px solid #000;">Gracias por tu pedido. Nos pondremos en contacto contigo pronto vía email con los detalles de tu compra.</p>

        <div class="cartcontent">
          <div id="cart-items"></div>
          
          <div class="subtotal" style="margin-top: 20px;">
            <span class="width2">Subtotal:</span> 
            <span id="cart-total">0.00</span>€
          </div>

          <div class="shipping" style="margin-top: 10px;">
            <label for="shipping" class="width3">Seleccionar Envío:</label>
            <select id="shipping" onchange="updateCart()" style="background: transparent; border: 0px solid #000; font-family: inherit;">
              <option value="5">5€ (España - Península)</option>
              <option value="10">10€ (Europa)</option>
              <option value="15">15€ (Resto del mundo)</option>
            </select>
          </div>

          <p class="total" style="margin-top: 20px; border-top: 0px solid #000; padding-top: 10px;">
            <strong>
              <span class="width2">Total Final:</span> 
              <span id="final-total">0.00</span>€
            </strong>
          </p>
          
          <button id="checkout-btn" class="hidden" onclick="startCheckout()" style="width: 20%; padding: 5px; margin-top: 20px; background-color: #000; color: #fff; border: none; 
          cursor: pointer; font-family: inherit; text-transform: none; font-size: 0.9rem;">Proceder al pago</button>
          
          <div id="paypal-button-container" class="hidden2" style="margin-top: 30px;"></div>
        </div>
      </div>
    </div>
  </div>

  <nav>
    <ul class="footnav">
      <div>
        <li><a href="https://www.instagram.com/lepatio" target="_blank">Instagram</a></li>
      </div>
      <div class="footerright footerright1">
        <li><a class="internal" href="order-info.html">Información de Pedido</a></li>
      </div>
      <div class="footerright footerright2">
        <li><a class="internal" href="legal.html">Aviso Legal</a></li>
      </div>
    </ul>
  </nav>

  <script src="libs.js"></script>
  

  <script>
    // --- LÓGICA DE PAYPAL  ---
    paypal.Buttons({
      style: {
        color: 'black',
        shape: 'rect',
        label: 'checkout'
      },
      createOrder: function(data, actions) {
        // Obtenemos el total dinámico del elemento HTML
        const totalValue = document.getElementById('final-total').textContent;
        return actions.order.create({
          purchase_units: [{
            amount: {
              currency_code: 'EUR',
              value: totalValue
            }
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          // Acción tras pago exitoso
          document.querySelector('.cartcontent').style.display = 'none';
          document.getElementById('success-message').style.display = 'block';
          localStorage.removeItem('cart');
          updateCartCount();
        });
      }
    }).render('#paypal-button-container');

    // --- FUNCIONES DEL CARRITO ---
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const cartItemsContainer = document.getElementById('cart-items');
      const emptyMessage = document.getElementById('empty');
      const cartContent = document.querySelector('.cartcontent');
      const checkoutBtn = document.getElementById('checkout-btn');
      
      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '';
        emptyMessage.style.display = 'block';
        cartContent.style.display = 'none';
        checkoutBtn.classList.add('hidden');
        return;
      }
      
      emptyMessage.style.display = 'none';
      cartContent.style.display = 'block';
      checkoutBtn.classList.remove('hidden');
      
      let html = '';
      cart.forEach((item, index) => {
        html += `
          <div class="cart-item" style="display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #000; align-items: center;">
            <img src="${item.image}" alt="${item.name}" style="width: 80px; height: 100px; object-fit: cover;">
            <div style="flex: 1;">
              <h3 style="margin: 0; font-size: 0.9rem; text-transform: uppercase;">${item.name}</h3>
              <p style="margin: 5px 0; font-size: 0.8rem; opacity: 0.6;">Talla: ${item.size}</p>
              <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="number" value="${item.quantity}" min="1" style="width: 40px; background: transparent; border: 1px solid #000; text-align: center;" 
                  onchange="updateItemQuantity(${index}, this.value)">
                <button onclick="removeFromCart(${index})" style="background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 0.7rem;">Remove</button>
              </div>
            </div>
            <div style="text-align: right;">
              <p style="font-size: 0.9rem;">${(item.price * item.quantity).toFixed(2)}€</p>
            </div>
          </div>
        `;
      });
      
      cartItemsContainer.innerHTML = html;
      updateCart();
    }
    
    function startCheckout() {
      const checkoutBtn = document.getElementById('checkout-btn');
      const paypalContainer = document.getElementById('paypal-button-container');
      
      // Hide button and show PayPal
      checkoutBtn.classList.add('hidden');
      paypalContainer.classList.remove('hidden2');
    }
    
    function updateItemQuantity(index, newQuantity) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart[index].quantity = parseInt(newQuantity) || 1;
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }
    
    function removeFromCart(index) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }
    
    function updateCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const shipping = parseFloat(document.getElementById('shipping').value) || 0;
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('cart-total').textContent = subtotal.toFixed(2);
      document.getElementById('final-total').textContent = (subtotal + shipping).toFixed(2);
    }
    
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.querySelectorAll('#cart-count').forEach(span => span.textContent = `(${totalItems})`);
    }
    
    window.addEventListener('load', function() {
      renderCart();
      updateCartCount();
    });
  </script>
</body>
</html>
