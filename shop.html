<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1">
  <title>SHOP | LE PATIO</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    /* Unificado con Código A */
    body, html {
      margin: 0;
      padding: 0;
      background-color: #f1f1f1; /* Fondo claro para la tienda */
      font-family: 'Times New Roman', Times, serif;
    }
    
    /* Espaciado para el nav fijo y contenedor AJAX */
    #content {
      width: 100%;
      height: 100%;
    }

    /* Navegación (Copia exacta del Código A) */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 20;
      background: transparent !important;
    }

    nav ul {
      display: flex;
      justify-content: space-between;
      list-style: none;
      padding: 20px 40px;
      margin: 0;
    }

    nav ul li a {
      color: #000 !important; /* En la shop usamos negro para contraste */
      text-transform: none;
      font-size: 0.9rem;      
    }

    /* Estilo de Filtros */
    .filter { text-align: center; margin-bottom: 40px; cursor: pointer; }
    .filter span { margin: 0 15px; text-transform: none; font-size: 0.9rem; color: #000; }
    .filter span.on { border-bottom: 1px solid #000; }
    .filter span.passive { opacity: 0.3; }

    /* Cuadrícula de productos */
    .products-grid { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 40px 20px; 
      padding: 0 40px;
      max-width: 600px; 
      margin: 0 auto; 
    }

    .productteaser { text-align: center; transition: opacity 0.3s; }
    .productteaser.hidden { display: none; }
    .productteaser img { width: 100%; height: auto; margin-bottom: 15px; }
    
    .product-info h3 { font-weight: 300; margin-bottom: 5px; font-size: 1.1rem; }
    .product-info p { margin: 5px 0; font-size: 0.9rem; }
    
    .product-info select { 
      margin: 10px 0; 
      padding: 8px; 
      border: 1px solid #ccc; 
      width: 100%; 
      font-family: serif;
      background: white;
    }
    
    .add-btn { 
      background: #000; color: #fff; border: none; padding: 12px 20px; 
      width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75rem;
      letter-spacing: 0.1rem;
      transition: opacity 0.2s;
    }
    .add-btn:hover { opacity: 0.8; }

    /* Desplegable Collections adaptado al diseño A */
    .nav-item { position: relative; display: inline-block; }
    .dropdown-content {
      display: none; 
      position: absolute;
      background-color: #f1f1f1;
      min-width: 180px; 
      z-index: 30;
      top: 100%;
      left: 0;
      padding-top: 10px;
    }
    .dropdown-content a { 
      color: black !important; 
      padding: 10px 0; 
      text-decoration: none; 
      display: block; 
      font-size: 0.8rem;
    }
    .nav-item:hover .dropdown-content { display: block; }

  </style>
</head>
<body ndx--target-view="shop">

  <nav>
    <ul>
      <div class="nav-left">
        <li style="display:inline; margin-right:15px;">
          <a href="index.html">Back</a>
        </li>
        <li style="display:inline;">
          <a href="collections.html">Collections</a>
        </li>
      </div>

      <div class="nav-right">
        <li class="cta_search" style="display:inline; margin-right:150px;">
          <a href="search.html">Buscar</a>
        </li>
        <li style="display:inline;">
          <a href="cart.html">Cart <span id="cart-count">(0)</span></a>
        </li>
      </div>
    </ul>
  </nav>

  <main id="content">

    <div class="filter">
      <span class="on" data-target="all">All</span>
      <span data-target="anillos">Anillos</span>
      <span data-target="collares">Collares</span>
      <span data-target="pendientes">Pendientes</span>
      <span data-target="pulseras">Pulseras</span>
    </div>

    <div class="products-grid">
      
      <div class="productteaser anillos">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41581360/original_b892d287b9e6b259d3c99b09f68450a6.jpg?1764881763?bc=0" alt="Anillo">
        <div class="product-info">
          <h3>Anillo Silver Leaf</h3>
          <p>120.00€</p>
          <select id="size-ring-1">
            <option value="8">Talla 8</option>
            <option value="10">Talla 10</option>
            <option value="12">Talla 12</option>
            <option value="14">Talla 14</option>
          </select>
          <button class="add-btn" onclick="addToCart('Anillo Silver Leaf', 120, document.getElementById('size-ring-1').value, 1)">Añadir al carrito</button>
        </div>
      </div>

      <div class="productteaser collares">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41527893/original_bed7e61b1241647953bf8ab5e2ec2623.png?1764715602?bc=0" alt="Collar">
        <div class="product-info">
          <h3>Collar Aqua</h3>
          <p>85.00€</p>
          <button class="add-btn" onclick="addToCart('Collar Aqua', 85, 'Unique', 1)">Añadir al carrito</button>
        </div>
      </div>

      <div class="productteaser pendientes">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41581361/original_bee3adae780b76faae3a99ba00dbd66a.jpg?1764881765?bc=0" alt="Pendientes">
        <div class="product-info">
          <h3>Pendientes Drop</h3>
          <p>60.00€</p>
          <button class="add-btn" onclick="addToCart('Pendientes Drop', 60, 'Unique', 1)">Añadir al carrito</button>
        </div>
      </div>

    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="libs.js"></script> 
  <script src="script.js"></script>
</body>
</html>
