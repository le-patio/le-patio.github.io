<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1">
  <title>SHOP | LE PATIO</title>

   <link rel="stylesheet" type="text/css" href="style.css">
  
  <style>
    /* RESET & BASE */
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      background-color: #f1f1f1;
      font-family: 'Times New Roman', Times, serif;
      color: #000;
      
    }

    /* NAVEGACIÓN (Estilo AGE hh / Minimal) */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: #f1f1f1;
      padding: 20px 40px;
    }

    nav ul {
      display: flex;
      justify-content: space-between;
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 0.9rem;
    }

    nav a {
      color: #000;
      
    }

    .nav-left, .nav-right {
      display: flex;
      gap: 20px;
    }

    /* FILTROS */
    .filter-container {
      margin-top: 100px; /* Espacio para el nav fijo */
      margin-bottom: 40px;
      padding: 0 40px;
      font-size: 0.9rem;
    }

    .filter span {
      cursor: pointer;
      margin-right: 5px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .filter span.on {
      opacity: 1;
      border-bottom: 1px solid #000;
    }

    /* GRID DE PRODUCTOS (Lógica AGE hh) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 columnas */
      gap: 40px 20px;
      padding: 0 40px 80px 40px;
    }

    .productteaser {
      text-decoration: none;
      color: #000;
      display: block;
      transition: opacity 0.3s ease;
    }

    .productteaser img, .productteaser video {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .productdescription {
      margin-top: 12px;
      font-size: 0.85rem;
      line-height: 1.2;
    }

    .productteaser.hidden {
      display: none;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: 1fr; /* 1 columna en móvil */
        padding: 0 20px;
      }
      nav { padding: 20px; }
      .filter-container { padding: 0 20px; }
    }
  </style>
</head>

<body ndx--target-view="shop">

  <nav>
    <ul>
      <div class="nav-left">
        <li style="display:inline; margin-right:15px;">
          <a href="index.html">Shop</a>
        </li>
        <li style="display:inline;">
          <a href="collections.html">Collections</a>
        </li>
      </div>

      <div class="nav-right">
        <li class="cta_search" style="display:inline; margin-right:150px;">
          <a href="search.html">Search</a>
        </li>
        <li style="display:inline;">
          <a href="cart.html">Cart <span id="cart-count">(0)</span></a>
        </li>
      </div>
    </ul>
  </nav>

  <main id="content">
    
    <div class="filter-container">
      <div class="filter">
        <span class="on" data-target="all">All</span>,
        <span data-target="anillos">Anillos</span>,
        <span data-target="collares">Collares</span>,
        <span data-target="pendientes">Pendientes</span>,
        <span data-target="pulseras">Pulseras</span>
      </div>
    </div>

    <div class="products-grid" ndx--title="LE PATIO / Shop" ndx--template="shop">
      
      <a class="productteaser anillos" href="product-detail.html" ndx-target="product-detail.html">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41581360/original_b892d287b9e6b259d3c99b09f68450a6.jpg?1764881763?bc=0" alt="Anillo Silver Leaf">
        <div class="productdescription">
          Anillo Silver Leaf, 120.00€
        </div>
      </a>

      <a class="productteaser collares" href="product-detail.html" ndx-target="product-detail.html">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41527893/original_bed7e61b1241647953bf8ab5e2ec2623.png?1764715602?bc=0" alt="Collar Aqua">
        <div class="productdescription">
          Collar Aqua, 85.00€
        </div>
      </a>

      <a class="productteaser pendientes" href="product-detail.html" ndx-target="product-detail.html">
        <img src="https://d2w9rnfcy7mm78.cloudfront.net/41581361/original_bee3adae780b76faae3a99ba00dbd66a.jpg?1764881765?bc=0" alt="Pendientes Drop">
        <div class="productdescription">
          Pendientes Drop, 60.00€
        </div>
      </a>

   

    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(document).ready(function() {
      // Lógica de filtrado
      $('.filter span').on('click', function() {
        // UI de los botones
        $('.filter span').removeClass('on');
        $(this).addClass('on');

        const target = $(this).attr('data-target');

        // Filtrado de elementos
        if (target === 'all') {
          $('.productteaser').removeClass('hidden');
        } else {
          $('.productteaser').each(function() {
            if ($(this).hasClass(target)) {
              $(this).removeClass('hidden');
            } else {
              $(this).addClass('hidden');
            }
          });
        }
      });
    });
  </script>
</body>
</html>
